<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey Together</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            line-height: 1.7;
            color: #333;
            background-color: #fdfcf8; /* A soft, warm background */
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        header h1 {
            color: #d9534f; /* A romantic red/coral */
            font-size: 3em;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif; /* A more elegant font */
        }

        header p {
            font-size: 1.2em;
            color: #666;
        }

        .photo-gallery {
            text-align: center;
            margin-bottom: 40px;
        }

        .photo-gallery h2 {
            color: #5cb85c; /* A gentle green */
            font-size: 2em;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        .photos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .photos img {
            width: 300px; /* Fixed width for consistency */
            height: 200px; /* Fixed height to maintain aspect ratio */
            object-fit: cover; /* Ensures image covers the area without distortion */
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .photos img:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .our-story {
            text-align: center;
            margin-top: 40px;
        }

        .our-story h2 {
            color: #f0ad4e; /* A warm orange */
            font-size: 2em;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        .our-story p {
            font-size: 1.1em;
            color: #555;
            max-width: 700px;
            margin: 0 auto;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 0.9em;
            color: #888;
        }

        /* Optional: Google Fonts for better typography */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Georgia&display=swap');
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Aiz & Sam</h1>
            <p>Our Journey Together</p>
        </header>

        <section class="photo-gallery">
            <h2>Moments We Cherish</h2>
            <div class="photos">
                <!-- Replace 'placeholder.jpg' with your actual image file paths -->
                <img src="leo.jpeg" alt="">
                <img src="aihza.jpeg" alt="">
                <img src="sammm.jpeg" alt="">
                <img src="nic.jpeg" alt="">
            </div>
        </section>

        <section class="our-story">
            <h2>Our Story</h2>
            <p>
                Wala inaya kolang mag ml yan, papansin kasi ako sa mga ea AHHAHAHAHHA. LOVE U BABY KO
            </p>
        </section>
    </div>

    <footer>
        <p>&copy; 2023 A&S All rights reserved.</p>
    </footer>
</body>
</html>
